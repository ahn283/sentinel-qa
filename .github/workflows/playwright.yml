name: Playwright Tests

on:
  push:
    branches: [main]
    paths:
      - packages/playwright-runner/**
      - packages/mcp-server/**
  pull_request:
    paths:
      - packages/playwright-runner/**
      - packages/mcp-server/**

env:
  CI: true

jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright runner tests
        run: npm run test --workspace=packages/playwright-runner

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/playwright-runner/playwright-report/
          retention-days: 30

      - name: Upload screenshots and traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            packages/playwright-runner/test-results/
          retention-days: 30
